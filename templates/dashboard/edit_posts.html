{% extends 'base.html' %}


{% block content %}
{% load crispy_forms_tags %}

<div class="row">

    <!-- Left sidebar -->
    <!-- load sidebar here -->
    {% include 'dashboard/sidebar.html' %}

    <!-- Right side content -->
    <div class="col-md-9">

        <h1>edit Post</h1>

        <form action="{% url 'edit_posts' post.id %}" method="POST" style="width: 500px;" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form | crispy }}
        <button type="submit" class="btn btn-warning">Submit</button>

        </form>
    </div>

</div>

{% endblock %}
